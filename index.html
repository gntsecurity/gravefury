<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gravefury - Enter the world of relentless combat and intense gaming experience.">
    <title>Gravefury | Official Website</title>
    <link rel="stylesheet" href="assets/styles/styles.css">
    <link rel="icon" href="assets/images/favicon/96x96-01.ico">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <div class="logo-container">
            <img src="assets/images/logo/160x160_transparent.png" alt="Gravefury Logo" class="logo">
        </div>
        <nav class="nav">
            <a href="#about">About</a>
            <a href="#features">Game Features</a>
            <a href="#community">Community</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Hero Section with automatic slideshow -->
    <section class="hero">
        <div class="hero-image active" style="background-image: url('assets/images/hero/Hero1.png');"></div>
        <div class="hero-image" style="background-image: url('assets/images/hero/Hero2.png');"></div>

        <!-- Hero Navigation Dots -->
        <div class="hero-dots">
            <span class="dot active" onclick="showSlide(0)"></span>
            <span class="dot" onclick="showSlide(1)"></span>
        </div>
    </section>

    <script src="assets/js/scripts.js"></script>
</body>
</html>
